name: Weekly Health Check

# Runs on GitHub's infrastructure — independent of Claude Code / Anthropic.
on:
  schedule:
    # Sunday 23:00 UTC = Monday 09:00 Australia/Sydney (AEST).
    # Note: shifts to 10:00 local during Sydney daylight saving (Oct–Apr).
    - cron: '0 23 * * 0'
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run health check and email report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/health-check.mjs
